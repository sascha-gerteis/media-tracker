<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirecting...</title>
</head>
<body style="font-family:Arial;background:#0f172a;color:white;display:flex;align-items:center;justify-content:center;height:100vh;">
  Redirecting...
  <script>
    const SUPABASE_URL = "https://bmwcmfsraixtmjnjzhtz.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtd2NtZnNyYWl4dG1qbmp6aHR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDk5MjAsImV4cCI6MjA5MTg4NTkyMH0.zNqBuDUX8B1saCkseEqKzl31FYgqJmsta63pnWnjU84";

    function headers() {
      return {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json"
      };
    }

    async function api(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}${path}`, {
        ...options,
        headers: { ...headers(), ...(options.headers || {}) }
      });
      const text = await res.text();
      let data;
      try { data = text ? JSON.parse(text) : null; } catch { data = text; }
      if (!res.ok) {
        throw new Error(data?.message || data?.error || text || `HTTP ${res.status}`);
      }
      return data;
    }

    async function run() {
      try {
        const params = new URLSearchParams(window.location.search);
        const slug = params.get("slug");
        if (!slug) {
          document.body.textContent = "Missing slug";
          return;
        }

        const qrRows = await api(`/rest/v1/qr_codes?select=*&partner_slug=eq.${encodeURIComponent(slug)}&limit=1`);
        if (!qrRows || qrRows.length === 0) {
          document.body.textContent = "QR not found";
          return;
        }

        const row = qrRows[0];

        // unique scan = same qr_id + same user_agent only once
        // IP is not available from GitHub Pages frontend
        const userAgent = navigator.userAgent || "unknown";

        const existing = await api(
          `/rest/v1/scans?select=id&qr_id=eq.${encodeURIComponent(row.id)}&user_agent=eq.${encodeURIComponent(userAgent)}&limit=1`
        );

        if (!existing || existing.length === 0) {
          await api(`/rest/v1/scans`, {
            method: "POST",
            body: JSON.stringify({
              qr_id: row.id,
              ip: "frontend",
              user_agent: userAgent
            })
          });
        }

        window.location.replace(row.destination_url);
      } catch (err) {
        document.body.textContent = "Redirect failed: " + err.message;
      }
    }

    run();
  </script>
</body>
</html>
